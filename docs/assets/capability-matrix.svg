      <text x="24" y="78" fill="#6B4E16">Function Calling</text>
      <text x="24" y="108" fill="#6B4E16">LangChain</text>
      <text x="24" y="138" fill="#6B4E16">Tool recovery</text>
      <rect x="24" y="180" width="162" height="14" rx="7" fill="#F7E4BE"/>
      <rect x="24" y="180" width="152" height="14" rx="7" fill="#B7791F"/>
