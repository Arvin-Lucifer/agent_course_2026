  <text x="42" y="86" fill="#667085" font-family="Inter,Arial,sans-serif" font-size="15">The course is organized around the major engineering capabilities needed to build production-minded Agents.</text>
  <g font-family="Inter,Arial,sans-serif" font-size="15">
    <g transform="translate(72 130)">
      <rect width="210" height="250" rx="18" fill="#E8F7F3" stroke="#A7DCD4"/>
