<svg width="1180" height="460" viewBox="0 0 1180 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Development Capability Matrix</title>
  <desc id="desc">Capability coverage across model control, tools, knowledge, state, protocols, skills, evaluation and project delivery.</desc>
  <rect width="1180" height="460" rx="24" fill="#FFFDF8"/>
