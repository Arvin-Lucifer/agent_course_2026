      <text x="24" y="138" fill="#315D5A">Reasoning patterns</text>
      <rect x="24" y="180" width="162" height="14" rx="7" fill="#CFEDE8"/>
      <rect x="24" y="180" width="144" height="14" rx="7" fill="#0F766E"/>
