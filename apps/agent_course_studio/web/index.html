<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="flowCanvas" aria-hidden="true"></canvas>

    <div class="app-shell">
      <aside class="sidebar" aria-label="课程导航">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <div class="brand-title">AI Agent Studio</div>
            <div class="brand-subtitle">Agent 开发实战工作台</div>
          </div>
        </div>

        <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换深浅主题">深色</button>

        <label class="search-box">
          <span>搜索</span>
          <input id="globalSearch" type="search" placeholder="RAG、MCP、Skill、回滚..." autocomplete="off" />
        </label>

        <nav id="lessonNav" class="lesson-nav"></nav>
      </aside>

      <main class="main">
        <section class="studio-header">
          <div class="studio-copy">
            <p class="eyebrow">AI Agent Learning Workspace</p>
            <h1 id="courseTitle">AI Agent Studio</h1>
            <p id="courseDescription" class="studio-description">正在加载课程内容...</p>
          </div>
          <div class="studio-dashboard">
            <div id="courseStats" class="stats-grid" aria-label="课程统计"></div>
            <div class="coverage-panel">
              <div class="panel-title-row">
                <h2>能力覆盖</h2>
                <span class="status-pill">Studio</span>
              </div>
              <div id="coverageBars" class="coverage-bars"></div>
            </div>
          </div>
          <div id="phaseStrip" class="phase-strip" aria-label="课程阶段"></div>
        </section>

        <section class="workspace">
          <div class="lesson-header">
            <div>
              <p id="lessonCode" class="eyebrow">L01</p>
              <h2 id="lessonTitle">加载中</h2>
              <p id="lessonIntro" class="lesson-intro"></p>
            </div>
            <div class="lesson-actions">
              <button id="toggleDone" class="primary-action" type="button">标记完成</button>
              <button id="copyCommand" class="secondary-action" type="button">复制运行命令</button>
            </div>
          </div>

          <div id="topicPills" class="topic-pills"></div>

          <div class="tabs" role="tablist" aria-label="章节内容">
            <button class="tab active" data-tab="overview" type="button">概览</button>
            <button class="tab" data-tab="lecture" type="button">讲义</button>
            <button class="tab" data-tab="practice" type="button">实战</button>
            <button class="tab" data-tab="trace" type="button">图谱</button>
            <button class="tab" data-tab="challenge" type="button">挑战</button>
            <button class="tab" data-tab="interview" type="button">面试</button>
            <button class="tab" data-tab="resources" type="button">资源</button>
          </div>

          <section id="tabContent" class="tab-content" aria-live="polite"></section>
        </section>
      </main>

      <aside class="inspector" aria-label="学习助手">
        <section id="progressSummary" class="panel progress-panel" aria-label="学习进度">
          <div class="panel-title-row">
            <h2>学习进度</h2>
            <span class="status-pill">0/12</span>
          </div>
          <div class="progress-track" aria-label="完成率 0%"><i style="width:0%"></i></div>
          <p class="muted">从 L01 开始建立 Agent 基础，再一路推进到毕业项目。</p>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <h2>本地课程助手</h2>
            <span id="assistantMode" class="status-pill">检索式</span>
          </div>
          <p class="muted">
            基于课程索引回答，不调用外部模型；回答会附上引用来源。
          </p>
          <textarea id="assistantQuestion" rows="4" placeholder="例如：RAG 面试重点有哪些？"></textarea>
          <button id="askButton" class="primary-action wide" type="button">查询课程资料</button>
          <div id="assistantAnswer" class="assistant-answer"></div>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <h2>搜索结果</h2>
            <span id="searchCount" class="status-pill">0</span>
          </div>
          <div id="searchResults" class="search-results"></div>
        </section>

        <section class="panel">
          <div class="panel-title-row">
            <h2>实验运行</h2>
            <span id="runnerStatus" class="status-pill">检测中</span>
          </div>
          <p class="muted">
            真实运行默认关闭；开启后也只执行白名单章节脚本。
          </p>
          <button id="runLesson" class="secondary-action wide" type="button">运行本章一键脚本</button>
          <pre id="runOutput" class="run-output">等待操作。</pre>
        </section>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./data/course_boot.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
